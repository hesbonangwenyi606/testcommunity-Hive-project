<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Highlights | Test Community Kenya</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  </style>
</head>
<body class="bg-[#e9e6e4] font-sans">
  <custom-navbar></custom-navbar>

  <!-- Hero -->
  <section class="bg-[#204045] py-24 pt-36 text-center">
    <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Community Highlights</h1>
    <p class="text-[#7e9693] text-lg">Everything happening in Kenya's premier QA community</p>
  </section>

  <!-- Filter Tabs -->
  <div class="sticky top-16 z-50 bg-[#e9e6e4] border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-6 flex gap-2 py-3 overflow-x-auto">
      <button onclick="filterHighlights('all')" data-filter="all" class="filter-btn active-filter px-5 py-2 rounded-full text-sm font-medium transition whitespace-nowrap">All</button>
      <button onclick="filterHighlights('event')" data-filter="event" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition whitespace-nowrap">Events</button>
      <button onclick="filterHighlights('member')" data-filter="member" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition whitespace-nowrap">Member Spotlights</button>
      <button onclick="filterHighlights('gallery')" data-filter="gallery" class="filter-btn px-5 py-2 rounded-full text-sm font-medium transition whitespace-nowrap">Gallery</button>
    </div>
  </div>

  <!-- Highlights Grid -->
  <main class="max-w-5xl mx-auto px-6 py-12">
    <div id="highlights-container" class="space-y-6"></div>
  </main>

  <custom-footer></custom-footer>

  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
  <script>
    const ACCENT1 = '#204045';
    const ACCENT2 = '#7e9693';

    const ICONS = {
      event: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      member: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      gallery: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    };

    function buildHighlights(data) {
      const items = [];

      // Events
      data.events.forEach(e => {
        const date = new Date(e.date).toLocaleDateString('en-KE', { year: 'numeric', month: 'long', day: 'numeric' });
        items.push({
          type: 'event',
          label: e.category.charAt(0).toUpperCase() + e.category.slice(1),
          title: e.title,
          description: e.description,
          meta: `${date} &nbsp;·&nbsp; ${e.venue}, ${e.city}`,
          link: `/events.html`,
          accent: e.featured ? ACCENT1 : ACCENT2,
        });
      });

      // Members
      data.members.forEach(m => {
        items.push({
          type: 'member',
          label: 'Member Spotlight',
          title: m.name,
          description: `${m.role} &mdash; ${m.bio}`,
          meta: `${m.location} &nbsp;·&nbsp; ${m.workMode} &nbsp;·&nbsp; ${m.skills.join(', ')}`,
          link: `/directory.html`,
          accent: ACCENT2,
        });
      });

      // Gallery
      data.gallery.forEach(g => {
        const date = new Date(g.date).toLocaleDateString('en-KE', { year: 'numeric', month: 'long', day: 'numeric' });
        items.push({
          type: 'gallery',
          label: g.category.charAt(0).toUpperCase() + g.category.slice(1),
          title: g.title,
          description: 'Browse photos and moments from this community event.',
          meta: date,
          link: `/gallery.html`,
          accent: ACCENT1,
        });
      });

      return items;
    }

    function renderHighlights(items) {
      const container = document.getElementById('highlights-container');
      container.innerHTML = items.map(item => `
        <div class="highlight-card bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col md:flex-row" data-type="${item.type}">
          <div class="flex items-center justify-center gap-3 px-8 py-6 min-w-[220px]" style="background:${item.accent}">
            <div class="text-white opacity-90">${ICONS[item.type]}</div>
            <span class="text-white font-semibold text-sm uppercase tracking-wide">${item.label}</span>
          </div>
          <div class="p-6 flex flex-col justify-center flex-1">
            <h3 class="text-lg font-bold text-[#204045] mb-1">${item.title}</h3>
            <p class="text-[#555] text-sm mb-2">${item.description}</p>
            <p class="text-xs text-[#7e9693] mb-3">${item.meta}</p>
            <a href="${item.link}" class="text-sm font-medium text-[#204045] hover:text-[#7e9693] transition">Read More &rarr;</a>
          </div>
        </div>
      `).join('');
    }

    let allItems = [];

    function filterHighlights(type) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active-filter', btn.dataset.filter === type);
      });
      const filtered = type === 'all' ? allItems : allItems.filter(i => i.type === type);
      renderHighlights(filtered);
    }

    async function init() {
      const res = await fetch('/data/content.json');
      const data = await res.json();
      allItems = buildHighlights(data);
      renderHighlights(allItems);
      feather.replace();
    }

    init();
  </script>

  <style>
    .filter-btn { background: white; color: #204045; border: 2px solid transparent; }
    .filter-btn:hover { border-color: #204045; }
    .active-filter { background: #204045 !important; color: white !important; }
  </style>
</body>
</html>
